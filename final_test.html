<!DOCTYPE html>
<html>
<head>
    <title>Финальный тест игры</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border: 2px solid #ff6b8b;
            border-radius: 15px;
            background: #fff9fb;
        }
        h1 { color: #ff4081; }
        .test-btn {
            padding: 12px 24px;
            margin: 10px;
            background: linear-gradient(135deg, #ff6b8b, #ff4081);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .test-btn:hover {
            background: linear-gradient(135deg, #ff4081, #ff6b8b);
            transform: translateY(-2px);
        }
        .test-area {
            width: 100%;
            height: 300px;
            border: 2px dashed #ffb8d9;
            border-radius: 10px;
            margin: 20px 0;
            position: relative;
            background: #fff;
            overflow: hidden;
        }
        .test-flower {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            position: absolute;
            background: #ffccdc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 30px;
            transition: all 0.3s;
            border: 3px solid #ff6b8b;
        }
        .test-flower:hover {
            transform: scale(1.1);
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            font-size: 18px;
        }
        .stat-item {
            padding: 10px 20px;
            background: #ffebee;
            border-radius: 10px;
            border: 2px solid #ffccdc;
        }
        #test-output {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #ddd;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
        }
        .success { color: #4CAF50; font-weight: bold; }
        .error { color: #f44336; font-weight: bold; }
        .info { color: #2196F3; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🎮 Тест игры "С 8 Марта"</h1>
        <p>Проверка основной логики игры</p>
        
        <div class="stats">
            <div class="stat-item">🌸 Цветов: <span id="test-count">0</span>/10</div>
            <div class="stat-item">⭐ Очки: <span id="test-score">0</span></div>
            <div class="stat-item">⏱️ Время: <span id="test-time">60</span>с</div>
        </div>
        
        <div class="test-area" id="test-game-area">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff80ab;">
                Нажми "Создать цветы" чтобы начать
            </div>
        </div>
        
        <div>
            <button class="test-btn" onclick="createTestFlowers()">🌸 Создать цветы</button>
            <button class="test-btn" onclick="simulateWin()">🎯 Тест победы</button>
            <button class="test-btn" onclick="resetTest()">🔄 Сбросить тест</button>
            <button class="test-btn" onclick="runFullTest()">🚀 Полный тест</button>
        </div>
        
        <div id="test-output"></div>
    </div>
    
    <script>
        let testFlowerCount = 0;
        let testScore = 0;
        let testTime = 60;
        let testFlowers = [];
        const testGameArea = document.getElementById('test-game-area');
        const testOutput = document.getElementById('test-output');
        
        function logTest(type, message) {
            const timestamp = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${timestamp}] ${message}`;
            testOutput.appendChild(div);
            testOutput.scrollTop = testOutput.scrollHeight;
            console.log(`[${type}] ${message}`);
        }
        
        function updateTestDisplay() {
            document.getElementById('test-count').textContent = testFlowerCount;
            document.getElementById('test-score').textContent = testScore;
            document.getElementById('test-time').textContent = testTime;
        }
        
        function createTestFlowers() {
            logTest('info', 'Создаем тестовые цветы...');
            testGameArea.innerHTML = '';
            testFlowers = [];
            
            // Создаем 5 цветов в случайных позициях
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'test-flower';
                    flower.innerHTML = '🌸';
                    flower.title = 'Кликни чтобы собрать!';
                    
                    const x = 20 + Math.random() * (testGameArea.offsetWidth - 90);
                    const y = 20 + Math.random() * (testGameArea.offsetHeight - 90);
                    
                    flower.style.left = x + 'px';
                    flower.style.top = y + 'px';
                    flower.style.backgroundColor = getRandomPastelColor();
                    
                    flower.addEventListener('click', function() {
                        collectTestFlower(this);
                    });
                    
                    testGameArea.appendChild(flower);
                    testFlowers.push(flower);
                    logTest('info', `Создан цветок ${i+1} на позиции (${Math.round(x)}, ${Math.round(y)})`);
                }, i * 300);
            }
            
            logTest('success', '5 тестовых цветов созданы! Кликай по ним.');
        }
        
        function collectTestFlower(flower) {
            if (flower.classList.contains('collected')) {
                logTest('error', 'Цветок уже собран!');
                return;
            }
            
            flower.classList.add('collected');
            flower.style.opacity = '0.7';
            flower.style.transform = 'scale(0.8)';
            flower.style.backgroundColor = '#c8e6c9';
            flower.innerHTML = '✅';
            
            testFlowerCount++;
            testScore += 10;
            
            updateTestDisplay();
            logTest('success', `Цветок собран! Всего: ${testFlowerCount}, Очки: ${testScore}`);
            
            setTimeout(() => {
                flower.style.opacity = '0';
                setTimeout(() => {
                    if (flower.parentNode) {
                        flower.remove();
                        testFlowers = testFlowers.filter(f => f !== flower);
                    }
                }, 300);
            }, 500);
            
            // Проверяем победу
            if (testFlowerCount >= 10) {
                setTimeout(() => {
                    logTest('success', '🎉🎉🎉 ПОБЕДА! Собрано 10 цветов! 🎉🎉🎉');
                    alert('🎉 ПОЗДРАВЛЯЕМ! Вы собрали 10 цветов и выиграли игру!');
                    showTestCongratulations();
                }, 600);
            }
        }
        
        function simulateWin() {
            logTest('info', '=== Запуск теста победы ===');
            testFlowerCount = 9;
            testScore = 90;
            updateTestDisplay();
            logTest('info', `Установлено: цветов = ${testFlowerCount}, очков = ${testScore}`);
            
            // Имитируем сбор последнего цветка
            setTimeout(() => {
                testFlowerCount++;
                testScore += 10;
                updateTestDisplay();
                logTest('success', `Собран последний цветок! Всего: ${testFlowerCount}`);
                
                if (testFlowerCount >= 10) {
                    logTest('success', '✅ ТЕСТ ПРОЙДЕН: Победа корректно определяется!');
                    showTestCongratulations();
                }
            }, 1000);
        }
        
        function showTestCongratulations() {
            const messages = [
                "Тест пройден успешно! Игра работает корректно! 🎮",
                "Поздравления будут показаны при победе в реальной игре! 💐",
                "Все системы функционируют нормально! ✅"
            ];
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            logTest('success', randomMsg);
            
            // Показываем имитацию поздравления
            testGameArea.innerHTML = `
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: white; padding: 30px; border-radius: 15px; border: 3px solid #ff6b8b; box-shadow: 0 10px 30px rgba(255, 107, 139, 0.3);">
                    <h2 style="color: #ff4081; margin: 0 0 15px 0;">🎉 ПОБЕДА! 🎉</h2>
                    <p style="color: #666; margin: 0;">С 8 Марта, прекрасная! 💖</p>
                    <p style="color: #ff80ab; margin: 10px 0 0 0;">Игра работает корректно!</p>
                </div>
            `;
        }
        
        function resetTest() {
            logTest('info', '=== Сброс теста ===');
            testFlowerCount = 0;
            testScore = 0;
            testTime = 60;
            testFlowers = [];
            testGameArea.innerHTML = '<div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff80ab;">Нажми "Создать цветы" чтобы начать</div>';
            updateTestDisplay();
            logTest('success', 'Тест сброшен. Готов к новому тесту.');
        }
        
        function runFullTest() {
            logTest('info', '=== ЗАПУСК ПОЛНОГО ТЕСТА ===');
            resetTest();
            
            setTimeout(() => {
                logTest('info', '1. Тест создания цветов...');
                createTestFlowers();
                
                setTimeout(() => {
                    logTest('info', '2. Тест сбора цветов...');
                    // Имитируем сбор 10 цветов
                    testFlowerCount = 10;
                    testScore = 100;
                    updateTestDisplay();
                    
                    setTimeout(() => {
                        logTest('info', '3. Проверка условия победы...');
                        if (testFlowerCount >= 10) {
                            logTest('success', '✅ ВСЕ ТЕСТЫ ПРОЙДЕНЫ УСПЕШНО!');
                            logTest('success', 'Игра "С 8 Марта" работает корректно!');
                            showTestCongratulations();
                        } else {
                            logTest('error', '❌ Тест не пройден: условие победы не сработало');
                        }
                    }, 1000);
                }, 2000);
            }, 500);
        }
        
        function getRandomPastelColor() {
            const colors = [
                '#ffb3c1', '#ffccd5', '#ffb7c5', '#ffcccb', '#ffcad4',
                '#ffd6e7', '#ffecf1', '#fff9fb', '#f8bbd9', '#f48fb1'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // Инициализация
        updateTestDisplay();
        logTest('info', 'Тестовая система готова. Нажмите кнопки для тестирования.');
        logTest('info', 'Рекомендуется: 1) Создать цветы 2) Кликать по ним 3) Проверить победу');
    </script>
</body>
</html>
